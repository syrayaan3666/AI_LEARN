spring.application.name=ailearn
spring.config.import=optional:file:.env[.properties]

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ai_learning_platform
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# External AI endpoints (no API keys included)
app.curricuforge.generate-url=https://curricu-forge-git-main-syrayaan3666s-projects.vercel.app/generate
app.curricuforge.refine-url=https://curricu-forge-git-main-syrayaan3666s-projects.vercel.app/refine-plan
app.curricuforge.generate-mode=raw
app.curricuforge.refine-mode=raw
app.llmrouter.ask-url=https://your-llmrouter-api.com/ask

# LLM Configuration for Notes Generation (Groq)
app.llm.api-key-groq=${GROQ_API_KEY:}
app.llm.provider=groq
app.llm.groq-model=llama-3.3-70b-versatile
app.llm.groq-fallback-models=llama-3.1-8b-instant
